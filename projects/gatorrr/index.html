<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gator Frogger - Classic Frogger Gameplay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            border: 3px solid #fff;
        }

        #ui {
            color: #fff;
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
        }

        #score, #lives, #timer {
            display: inline-block;
            margin: 0 20px;
            font-weight: bold;
        }

        #game-title {
            text-align: center;
            color: #fff;
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-title">🐊 GATOR FROGGER 🐊</div>
        <div id="phaser-game"></div>
        <div id="ui">
            <span id="score">Score: 0</span>
            <span id="lives">Lives: 3</span>
            <span id="timer">Time: 60s</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script src="config.js"></script>
    <script src="scenes/GameScene.js"></script>
    <script src="main.js"></script>
</body>
</html>
